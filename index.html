<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kuis Pemrograman Web</title>
</head>
<body>
    <section class="login-section">
        <div class="form-container">
            <div class="header-content">
                <img src="img/nyawit.jpeg" alt="Logo" class="logo">
                <h2>Selamat Datang</h2>
                <p class="subtitle">Silahkan masukkan data untuk masuk</p>
            </div>

            <form action="submit.php" method="POST" target="_blank">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                </div>

                <div class="input-group">
                    <label for="nama">Nama</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="ingat" name="ingat">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#" class="forgot-link">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-submit">Masuk</button>
            </form>
        </div>
    </section>
</body>
</html>
